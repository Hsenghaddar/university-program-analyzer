name: Run Study.eu pipeline

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 selenium webdriver-manager

      - name: Run pipeline
        run: |
          python study_eu_scrapped/run_pipeline.py

      - name: Commit updated CSV files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add study_eu_programs.csv study_eu_programs_cleaned.csv study_eu_programs_with_ranking.csv
          git commit -m "update dataset from automated scraper" || echo "no changes"
          git push